<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TINEAL HUB - Payment Confirmation</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .callback-container {
            max-width: 600px;
            margin: 80px auto;
            background: white;
            padding: 2rem;
            border-radius: 24px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        .success-icon {
            font-size: 4rem;
            color: #10b981;
            margin-bottom: 1rem;
        }
        .error-icon {
            font-size: 4rem;
            color: #dc2626;
            margin-bottom: 1rem;
        }
        .loading-icon {
            font-size: 2rem;
            color: #1a1a2e;
            margin-bottom: 1rem;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .order-details {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 12px;
            margin: 1rem 0;
            text-align: left;
        }
        .btn-primary {
            background: #1a1a2e;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 40px;
            text-decoration: none;
            display: inline-block;
            margin: 0.5rem;
        }
        .btn-secondary {
            background: #e2e8f0;
            color: #1a1a2e;
            padding: 0.75rem 1.5rem;
            border-radius: 40px;
            text-decoration: none;
            display: inline-block;
            margin: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="callback-container" id="callbackContainer">
        <div id="loadingState">
            <div class="loading-icon">⟳</div>
            <h2>Verifying Your Payment</h2>
            <p>Please wait while we confirm your transaction.</p>
        </div>

        <div id="successState" style="display: none;">
            <div class="success-icon">✓</div>
            <h2>Payment Successful</h2>
            <p>Thank you for your order. We've received your payment.</p>
            <div class="order-details" id="orderDetails"></div>
            <a href="track.html" class="btn-primary">Track Order</a>
            <a href="index.html" class="btn-secondary">Back to Home</a>
        </div>

        <div id="errorState" style="display: none;">
            <div class="error-icon">✗</div>
            <h2>Verification Failed</h2>
            <p>We couldn't verify your payment status. Please contact support.</p>
            <a href="shop.html" class="btn-primary">Shop Again</a>
            <a href="index.html" class="btn-secondary">Home</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const reference = urlParams.get('reference') || urlParams.get('trxref');
        
        async function verifyPayment() {
            if (!reference) {
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('errorState').style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch(`/api/verify-payment/${reference}`);
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('loadingState').style.display = 'none';
                    document.getElementById('successState').style.display = 'block';
                    document.getElementById('orderDetails').innerHTML = `
                        <p><strong>Order ID:</strong> ${result.orderDetails.orderId}</p>
                        <p><strong>Service:</strong> ${result.orderDetails.service}</p>
                        <p><strong>Amount Paid:</strong> GHS ${result.orderDetails.amount}</p>
                    `;
                } else {
                    document.getElementById('loadingState').style.display = 'none';
                    document.getElementById('errorState').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('errorState').style.display = 'block';
            }
        }
        
        verifyPayment();
        setTimeout(() => {
            const loadingState = document.getElementById('loadingState');
            if (loadingState.style.display !== 'none') {
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('errorState').style.display = 'block';
            }
        }, 10000);
    </script>
</body>
</html>
