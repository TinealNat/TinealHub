<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TINEAL HUB - Admin Login</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/log.png">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 80px auto;
            background: white;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #1a1a2e;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .login-form input {
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
        }
        .login-btn {
            background: #1a1a2e;
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
        }
        .login-btn:hover {
            background: #2d3748;
        }
        .error-msg {
            color: #dc2626;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }
        .logo-center {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .logo-center img {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-center">
            <img src="logo.png" alt="TINEAL HUB" onerror="this.src='https://placehold.co/60x60/1a1a2e/white?text=TH'">
            <h2>Admin Access</h2>
        </div>
        <form class="login-form" id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="login-btn">Login to Dashboard</button>
        </form>
        <div id="errorMsg" class="error-msg">Invalid username or password</div>
    </div>

    <script>
        const ADMIN_USERNAME = 'tinealadmin';
        const ADMIN_PASSWORD = 'TinealHub2024!';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                const credentials = btoa(`${username}:${password}`);
                localStorage.setItem('adminAuth', credentials);
                window.location.href = '/dashboard.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('errorMsg').style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>
</html>
